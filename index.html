<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SlimPumpkin - Coming Soon</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Noto Sans KR", "Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }

        .bg-mesh {
            background-color: #f8f6f6;
            background-image: radial-gradient(at 0% 0%, rgba(236, 91, 19, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(34, 161, 65, 0.1) 0px, transparent 50%);
        }

        .dark .bg-mesh {
            background-color: #221610;
            background-image: radial-gradient(at 0% 0%, rgba(236, 91, 19, 0.2) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(34, 161, 65, 0.15) 0px, transparent 50%);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display transition-colors duration-300">
    <div class="relative flex h-screen w-full flex-col overflow-hidden bg-mesh">
        <div class="layout-container flex h-full grow flex-col">
            <!-- Header -->
            <header class="flex items-center justify-between px-6 py-6 md:px-20 lg:px-40">
            </header>
            <!-- Main Content Section -->
            <main class="flex flex-1 items-center justify-center px-6 md:px-20 lg:px-40">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center max-w-7xl w-full">
                    <!-- Text Content -->
                    <div class="flex flex-col gap-8 order-2 lg:order-1">
                        <div class="space-y-4">
                            <span
                                class="inline-block px-4 py-1.5 rounded-full bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 text-xs font-bold uppercase tracking-widest">곧
                                출시됩니다</span>
                            <h1
                                class="text-5xl md:text-6xl lg:text-7xl font-black leading-tight tracking-tight text-slate-900 dark:text-white">
                                건강한 <span class="text-primary">변화</span>가 시작됩니다</h1>
                            <p class="text-lg md:text-xl text-slate-600 dark:text-slate-400 leading-relaxed max-w-xl">
                                마인드풀 식사와 영양소 섭취 순서 훈련을 통해 건강한 체중 감량을 돕는 혁신적인 앱을 만들고 있습니다. 현재 모바일 앱 출시를 준비 중입니다.</p>
                        </div>
                        <!-- Waitlist Form -->
                    </div>
                    <!-- Image / Visual Side -->
                    <div class="order-1 lg:order-2 flex justify-center lg:justify-end">
                        <div class="relative w-full aspect-square max-w-md lg:max-w-xl">
                            <!-- Decorative background shapes -->
                            <div class="absolute -top-10 -right-10 w-40 h-40 bg-primary/10 rounded-full blur-3xl"></div>
                            <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-emerald-500/10 rounded-full blur-3xl">
                            </div>
                            <div
                                class="w-full h-full rounded-[2.5rem] overflow-hidden shadow-2xl border-8 border-white dark:border-slate-800 bg-slate-200 dark:bg-slate-700">
                                <img alt="Nutritious balanced meal bowl" class="w-full h-full object-cover"
                                    data-alt="Appetizing healthy bowl with salmon, avocado, and fresh greens"
                                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuC_7BiChL1TnKUR5zsktfLejaVfYtRfDn9v8L0BC0BPLo_hxBPwDW6bq78shz8-hkHlhoZrsqk61bAUOTXRdNqCCaCiPJIQH1PbTn21OPqTD7460Ji2mQAQovaQrE19ObJif80FzlJ-_15fmFobAiaMiae4QLIpIuvqCSq679bwTU2jJBHk0HMnRhFCx13z5tutbsaMazj0RrP7lWSNqCi11ALQZoraIWr7cFzFEw-fMSQTf3CRVpqka6pQmWQpUAUZyUbB7bEvpBI" />
                            </div>
                        </div>
                    </div>
                </div>
            </main>
            <!-- Footer -->
            <footer class="px-6 py-8 md:px-20 lg:px-40 flex flex-col md:flex-row items-center justify-between gap-4">
                <p class="text-slate-500 dark:text-slate-500 text-sm font-medium">© 2024 SlimPumpkin. All rights
                    reserved.</p>
            </footer>
        </div>
    </div>
</body>

</html>
